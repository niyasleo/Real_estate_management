<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Registration | Premium Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<style>
    :root {
        /* The "Middle Ground" Palette */
        --bg-color: #334155;      /* Muted Slate Blue */
        --card-bg: #f1f5f9;      /* Very soft light gray (not pure white) */
        --accent-navy: #1e293b;  /* Professional Navy */
        --input-border: #cbd5e1;
        --text-main: #0f172a;
        --text-muted: #64748b;
    }

    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Jost', sans-serif;
        /* A subtle gradient that stays in the "muted blue" range */
        background: linear-gradient(135deg, #334155 0%, #475569 100%);
    }

    .main {
        width: 100%;
        max-width: 400px;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        height:600px;
    }

    h2 {
        color: var(--text-main);
        font-size: 1.8rem;
        text-align: center;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .subtitle {
        text-align: center;
        color: var(--text-muted);
        margin-bottom: 30px;
        font-size: 0.9rem;
    }

    .form-group {
        margin-bottom: 15px;
    }

    input, select {
        width: 100%;
        padding: 14px 16px;
        background: #ffffff;
        border: 1.5px solid var(--input-border);
        border-radius: 10px;
        color: var(--text-main);
        font-family: 'Jost', sans-serif;
        font-size: 15px;
        box-sizing: border-box;
        transition: all 0.2s ease;
    }

    input:focus, select:focus {
        outline: none;
        border-color: var(--bg-color);
        box-shadow: 0 0 0 3px rgba(51, 65, 85, 0.1);
    }

    button {
        width: 100%;
        padding: 14px;
        margin-top: 10px;
        background: var(--accent-navy);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }

    button:hover {
        background: #0f172a;
    }

    .footer-text {
        text-align: center;
        margin-top: 25px;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .footer-text a {
        color: var(--bg-color);
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="main">
    <div class="signup">
        <form method="post" action="{% url 'registration' %}">
            {% csrf_token %}
            <h2>Create Account</h2>
            <p class="subtitle">Please fill in your details below.</p>

            <div class="form-group">
                <input type="text" name="user" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="tel" name="mobile" placeholder="Mobile" required>
            </div>

            <div class="form-group">
                <select name="role" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="user">User</option>
                    <option value="Agent">Agent</option>
                    <option value="Owner">Owner</option>
                </select>
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="password" name="cpassword" placeholder="Confirm Password" required>
            </div>

            <button type="submit">Sign Up</button>

            <div class="footer-text">
                Already have an account? <a href="{% url 'login' %}">Log In</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% if messages %}
    <script>
        {% for i in messages %}
            Swal.fire({
                icon: "{% if i.tags == 'error' %}error{% elif i.tags == 'success' %}success{% else %}info{% endif %}",
                title: "{{ i }}",
                confirmButtonColor: '#1e293b'
            });
        {% endfor %}
    </script>
{% endif %}
</body>
</html>
