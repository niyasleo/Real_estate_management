<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Property | UrbanAxis</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
        /* Global & Navbar Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
        body { background-color: #f8fbf9; color: #1a1a1a; transition: 0.3s; }

      /* Navbar & Dropdown Fixes */
        .navbar-custom {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 60px; background-color: #fff; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 10000;
        }
        .logo { font-size: 24px; font-weight: 700; text-decoration: none; color: #1a1a1a; }
        .logo span { color: #2ecc71; }
        .nav-links a { margin-left: 25px; text-decoration: none; color: #333; font-weight: 500; position: relative; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #2ecc71; }

        /* Dropdown Bridge Fix */
        .user-dropdown { position: relative; display: inline-block; margin-left: 25px;

    margin-left: -10px;

        }
        .user-dropdown::after { content: ""; position: absolute; top: 100%; left: 0; width: 100%; height: 15px; display: block; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 100%; background: #fff;
            min-width: 160px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); z-index: 1000;
            border-radius: 8px; border: 1px solid #eee; overflow: hidden; margin-top: 10px;
        }
        .dropdown-content a { color: #333; padding: 12px 16px; display: block; font-size: 14px; text-decoration: none; margin-left: 0 !important; }
        .dropdown-content a:hover { background: #f8f9fa; color: #2ecc71; }
        .user-dropdown:hover .dropdown-content { display: block; }



        /* Generic UI Components */
        .page-section { display: none; padding: 40px 0; }
        .page-section.active { display: block; }
        .card-custom {
            background: white; border-radius: 15px; border: none;
            padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            margin-bottom: 30px;
        }
        .form-control-simple {
            border: none; border-bottom: 2px solid #eee; border-radius: 0;
            padding: 12px 0; margin-bottom: 20px; font-size: 0.95rem;
            background: transparent; width: 100%; outline: none; transition: 0.3s;
        }
        .form-control-simple:focus { border-bottom-color: #2ecc71; }
        .btn-green { background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; }

        /* Stats & Badges */
        .stat-box { text-align: center; border-right: 1px solid #eee; }
        .stat-box:last-child { border-right: none; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-live { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        /* Styling for the File Input to match your simple theme */
input[type="file"].form-control-simple {
    line-height: 1.2;
    cursor: pointer;
}

/* This styles the 'Choose File' button part specifically */
input[type="file"].form-control-simple::-webkit-file-upload-button {
    background: #2ecc71; /* Your theme green */
    border: none;
    padding: 5px 12px;
    border-radius: 4px;
    color: white;
    font-size: 0.75rem;
    font-weight: 600;
    margin-right: 10px;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.3s;
}

input[type="file"].form-control-simple::-webkit-file-upload-button:hover {
    background: #27ae60;
}
    </style>

</head>
<body>


<nav class="navbar-custom">

    <a style="text-decoration:none;" href="{% url 'agent_home' %}">
        <div style="letter-spacing:1px;" class="logo"  >Urban<span style="letter-spacing:1  px;" >Axis</span></div></a>

    <div class="nav-links">
        <a href="{% url 'agent_home' %}" class="active">Home</a>
        <a href="{% url 'enquiry' %}" >Enquiries</a>
        <a href="{% url 'listed_properties' %}">Properties</a>

        {% if request.session.username %}
        <div class="user-dropdown">
            <a href="">
                {{ request.session.username }} ▾
            </a>
            <div class="dropdown-content">
                <a href="{% url 'logout_view' %}" style="color:#e74c3c;">
                    Logout
                </a>
            </div>
        </div>
        {% else %}
        <div class="dropdown-content">
                <a href="" >
                    Login
                </a>
            </div>
        {% endif %}
    </div>
</nav>


<div class="container">
    <div class="card-custom">
        <h4 class="fw-bold mb-4">Update Property Details</h4>
                    <form id="addPropertyForm" method="post" action="{% url 'update_property' data.id %}" enctype="multipart/form-data">
                {% csrf_token %}
                            <div class="row">
                <div class="col-md-6">
                    <label>Property Title</label>
                    <input type="text" name="property_title" class="form-control-simple" value="{{ data.property_title }}">
                </div>
                <div class="col-md-6">
                    <label>Location</label>
                    <input type="text" name="location" class="form-control-simple" value="{{ data.location }}">
                </div>
                <div class="col-md-4">
                    <label>Price</label>
                    <input type="number" name="price" class="form-control-simple" value="{{ data.price }}">
                </div>
                <div class="col-md-4">
                    <label>Area</label>
                    <input type="text" name="area" class="form-control-simple" value="{{ data.area }}">
                </div>

                <div class="col-md-4">
                    <label>Property Type</label>
                    <select name="type" class="form-control-simple">
                        {% for i in obj %}
                            <option value="{{ i.property_types }}"
                                {% if i.property_types == data.type %}selected{% endif %}>
                                {{ i.property_types }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Status</label>
                   <select name="status" class="form-control-simple">
                       <option value="For Sale" {% if data.status == "For Sale" %}selected{% endif %}>For Sale</option>
                 <option value="For Rent" {% if data.status == "For Rent" %}selected{% endif %}>For Rent</option>
                 <option value="Sold Out" {% if data.status == "Sold Out" %}selected{% endif %}>Sold Out</option>
                 </select>
                </div>
                <div class="col-md-4">
                    <label>Bedrooms</label>
                    <input type="text" name="bedrooms" class="form-control-simple" value="{{ data.bedrooms }}">
                </div>
                <div class="col-md-4">
                    <label>Bathrooms</label>
                    <input type="text" name="bathrooms" class="form-control-simple" value="{{ data.bathrooms }}">
                </div>
                    <div class="col-12">
    <label class="small fw-bold text-muted d-block mb-1">Property Description</label>
    <textarea name="description"
          class="form-control-simple mb-3"
          rows="3"
          style="resize: vertical;" >{{data.description}}</textarea>
</div>


                <div class="col-md-4">
                    <label>Property Image 1</label>
                    <img src="{{data.image1.url}}" width="150px" height="100px">
                    <input type="file" name="property_image1" class="form-control-simple">
                </div>

                <div class="col-md-4">
                    <label>Property Image 2</label>
                    <img src="{{data.image2.url}}" width="150px" height="100px">

                    <input type="file" name="property_image2" class="form-control-simple">
                </div>
                <div class="col-md-4">
                    <label>Property Image 3</label>
                    <img src="{{data.image3.url}}" width="150px" height="100px">

                    <input type="file" name="property_image3" class="form-control-simple">
                </div>

                <div class="col-12 mt-3">
                    <label class="mb-3">Features Available:</label>
                  <div class="row row-cols-2 row-cols-md-4 g-2">

                    <div class="col">
                        <label class="small">
                            <input type="checkbox" name="features" value="Balcony"
                            {% if "Balcony" in data.features %}checked{% endif %}>
                            Balcony
                        </label>
                    </div>

                    <div class="col">
                        <label class="small">
                            <input type="checkbox" name="features" value="Modern Kitchen"
                            {% if "Modern Kitchen" in data.features %}checked{% endif %}>
                            Modern Kitchen
                        </label>
                    </div>

                    <div class="col">
                        <label class="small">
                            <input type="checkbox" name="features" value="Sauna"
                            {% if "Sauna" in data.features %}checked{% endif %}>
                            Sauna
                        </label>
                    </div>

                    <div class="col">
                        <label class="small">
                            <input type="checkbox" name="features" value="Storage"
                            {% if "Storage" in data.features %}checked{% endif %}>
                            Storage
                        </label>
                    </div>

                    <div class="col">
                        <label class="small">
                            <input type="checkbox" name="features" value="Pool"
                            {% if "Pool" in data.features %}checked{% endif %}>
                            Pool
                        </label>
                    </div>

                    <div class="col">
                        <label class="small">
                            <input type="checkbox" name="features" value="Gym"
                            {% if "Gym" in data.features %}checked{% endif %}>
                            Gym
                        </label>
                    </div>

                    <div class="col">
                        <label class="small">
                            <input type="checkbox" name="features" value="Cooling"
                            {% if "Cooling" in data.features %}checked{% endif %}>
                            Cooling
                        </label>
                    </div>

                    <div class="col">
                        <label class="small">
                            <input type="checkbox" name="features" value="Garage"
                            {% if "Garage" in data.features %}checked{% endif %}>
                            Garage
                        </label>
                    </div>

        <div class="col"><label class="small">
            <input type="checkbox" name="features" value="Emergency Exit"
                   {% if "Emergency Exit" in data.features %}checked{% endif %}> Emergency Exit</label></div>
        <div class="col"><label class="small"><input type="checkbox" name="features" value="Garden"
         {% if "Garden" in data.features %}checked{% endif %}> Garden</label></div>
        <div class="col"><label class="small"><input type="checkbox" name="features" value="Fireplace"
         {% if "Fireplace" in data.features %}checked{% endif %}> Fireplace</label></div>
        <div class="col"><label class="small"><input type="checkbox" name="features" value="WiFi"
         {% if "Wi-Fi" in data.features %}checked{% endif %}> Wi-Fi</label></div>

                </div>
                </div>
            </div>

                <div class="col-md-4 mt-4">
                    <button type="submit" class="btn-green">PUBLISH PROPERTY</button>
                </div>
            </form>

    </div>
</div>

</body>
</html>
